<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024, initial-scale=0.35, user-scalable=yes" />
  <title>Loading...</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      overflow: hidden;
    }

    /* ========== صفحه اسپلش (سورپرایز) ========== */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      cursor: pointer;
    }

    .splash-screen.hide {
      opacity: 0;
      visibility: hidden;
    }

    .splash-content {
      text-align: center;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .splash-bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      pointer-events: none;
    }

    .circle1 {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -100px;
    }

    .circle2 {
      width: 500px;
      height: 500px;
      bottom: -200px;
      right: -150px;
      background: rgba(255,255,255,0.02);
    }

    .circle3 {
      width: 200px;
      height: 200px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.04);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.1; }
    }

    .splash-logo {
      font-size: 80px;
      margin-bottom: 20px;
      display: inline-block;
      animation: gentleFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .splash-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      margin: 15px 0 10px;
      letter-spacing: 2px;
    }

    .splash-subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 35px;
      font-weight: 300;
    }

    .enter-btn {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 35px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Vazirmatn', sans-serif;
    }

    .enter-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      transform: scale(1.02);
    }

    .enter-btn:active {
      transform: scale(0.98);
    }

    /* ========== صفحه اصلی ========== */
    .main-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      background: linear-gradient(145deg, #ffb6c7 0%, #ff99b5 40%, #ff7a9e 100%);
    }

    .main-page.show {
      opacity: 1;
      visibility: visible;
    }

    /* ایموجی‌های در حال سقوط */
    .falling-emojis {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .falling-emoji {
      position: absolute;
      font-size: 28px;
      animation: fall linear infinite;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(231, 230, 224, 0.8);
      filter: drop-shadow(0 0 6px rgba(255,255,200,0.5));
      z-index: 1;
    }

    @keyframes fall {
      0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
      80% { opacity: 0.9; }
      100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
    }

    /* انیمیشن لود شدن کارت */
    @keyframes cardGlowIn {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7);
        filter: blur(10px);
      }
      50% {
        opacity: 0.7;
        transform: translate(-50%, -50%) scale(1.02);
        filter: blur(2px);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0);
      }
    }

    @keyframes fadeInUpElem {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* کارت اصلی */
    .card {
      position: relative;
      z-index: 10;
      width: 560px;
      max-height: 85vh;
      overflow-y: auto;
      background: rgba(255, 245, 250, 0.28);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(255, 255, 255, 0.3) inset, 0 0 30px rgba(255, 200, 220, 0.5);
      padding: 2.5rem 2rem;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: cardGlowIn 0.8s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }

    .card::-webkit-scrollbar {
      width: 0;
    }

    /* انیمیشن المان‌های داخل کارت */
    .card .avatar {
      animation: fadeInUpElem 0.5s ease forwards;
      opacity: 0;
    }

    .card h1 {
      animation: fadeInUpElem 0.5s ease 0.1s forwards;
      opacity: 0;
    }

    .card .subtitle {
      animation: fadeInUpElem 0.5s ease 0.2s forwards;
      opacity: 0;
    }

    .card .counter {
      animation: fadeInUpElem 0.5s ease 0.3s forwards;
      opacity: 0;
    }

    .card .message-box {
      animation: fadeInUpElem 0.5s ease 0.4s forwards;
      opacity: 0;
    }

    .card .buttons-container {
      animation: fadeInUpElem 0.5s ease 0.5s forwards;
      opacity: 0;
    }

    .card .footer {
      animation: fadeInUpElem 0.5s ease 0.6s forwards;
      opacity: 0;
    }

    /* عکس با قاب مشخص */
    .avatar {
      width: 160px;
      height: 160px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 5px solid #ffffff;
      outline: 3px solid #ff99b5;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      background: white;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 6px 18px #e84172;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1rem;
      color: #474747;
      background: rgba(255, 255, 255, 0.2);
      display: inline-block;
      padding: 6px 20px;
      border-radius: 60px;
      margin-bottom: 22px;
      backdrop-filter: blur(8px);
      font-weight: 500;
    }

    .counter {
      background: rgba(255, 245, 250, 0.35);
      padding: 14px 20px;
      border-radius: 50px;
      margin: 20px 0;
      font-weight: bold;
      font-size: 1rem;
      backdrop-filter: blur(12px);
      color: #474747;
      font-family: monospace;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .message-box {
      background: rgba(255, 240, 248, 0.45);
      padding: 22px 20px;
      border-radius: 40px;
      font-size: 1rem;
      line-height: 1.8;
      color: #474747;
      font-weight: 500;
      margin-bottom: 30px;
      backdrop-filter: blur(12px);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .buttons-container {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .music-btn, .voice-btn {
      border: none;
      padding: 14px 24px;
      border-radius: 100px;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .music-btn {
      background: linear-gradient(135deg, #ff6b8f, #ff3a6e);
      box-shadow: 0 15px 25px -8px rgba(197, 48, 98, 0.5);
    }

    .voice-btn {
      background: linear-gradient(135deg, #6c63ff, #3a2e8e);
      box-shadow: 0 15px 25px -8px rgba(60, 30, 150, 0.5);
    }

    .music-btn:active, .voice-btn:active {
      transform: scale(0.96);
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #fff5f7;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <!-- صفحه اسپلش - سورپرایز -->
  <div class="splash-screen" id="splashScreen">
    <div class="splash-bg-circle circle1"></div>
    <div class="splash-bg-circle circle2"></div>
    <div class="splash-bg-circle circle3"></div>
    
    <div class="splash-content">
      <div class="splash-logo" id="splashLogo">✨</div>
      <div class="splash-title">یک لحظه خاص</div>
      <div class="splash-subtitle">برای تو...</div>
      <button class="enter-btn" id="enterBtn">
        <span>🔓</span> ادامه
      </button>
    </div>
  </div>

  <!-- صفحه اصلی (سالگرد) -->
  <div class="main-page" id="mainPage">
    <div class="falling-emojis" id="fallingContainer"></div>

    <div class="card">
      <div class="avatar">
        <img src="./IMG_20250901_011821_351.jpg" alt="عکس شما" id="profileImg">
      </div>
      <h1>سالگردمون مبارک عشق من ❤️</h1>
      <div class="subtitle">✨ هر ثانیه کنار تو یه خاطره قشنگه ✨</div>

      <div class="counter" id="timerDisplay">در حال محاسبه...</div>

      <div class="message-box" id="loveMessage"></div>

      <div class="buttons-container">
        <button class="music-btn" id="playPauseBtn"><span>🎵</span> پخش موزیک</button>
        <button class="voice-btn" id="voiceMessageBtn"><span>🎤</span> پیام من</button>
      </div>
      <div class="footer">با تمام وجودم ساخته شده برای تو ❤️</div>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="./Aron Afshar - Havato Daram Eshgh.mp3" type="audio/mpeg">
  </audio>
  <audio id="voiceMessage" preload="auto">
    <source src="./my_voice.ogg" type="audio/ogg">
    <source src="./my_voice.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      // المان‌ها
      const splashScreen = document.getElementById('splashScreen');
      const mainPage = document.getElementById('mainPage');
      const bgAudio = document.getElementById('bgMusic');
      const voiceAudio = document.getElementById('voiceMessage');
      const playPauseBtn = document.getElementById('playPauseBtn');
      const voiceBtn = document.getElementById('voiceMessageBtn');
      
      // وضعیت ویس
      let isVoicePlaying = false;
      
      // توابع پخش و توقف موزیک
      function playMusic() {
        bgAudio.play().catch(e => console.log("پخش موزیک:", e));
        playPauseBtn.innerHTML = '<span>🎶</span> در حال پخش...';
        playPauseBtn.style.background = "linear-gradient(135deg, #5fcb96, #2e8b57)";
      }
      
      function pauseMusic() {
        bgAudio.pause();
        playPauseBtn.innerHTML = '<span>🎵</span> پخش موزیک';
        playPauseBtn.style.background = "linear-gradient(135deg, #ff6b8f, #ff3a6e)";
      }
      
      // تابع ورود به صفحه اصلی
      let isEntered = false;
      
      function enterMainPage() {
        if (isEntered) return;
        isEntered = true;
        
        splashScreen.classList.add('hide');
        mainPage.classList.add('show');
        
        // ریست انیمیشن کارت
        const card = document.querySelector('.card');
        if (card) {
          card.style.animation = 'none';
          setTimeout(() => {
            card.style.animation = 'cardGlowIn 0.8s cubic-bezier(0.34, 1.2, 0.64, 1) forwards';
          }, 10);
        }
        
        playMusic();
        startFallingEmojis();
        startCounter();
        startTypeWriter();
      }
      
      // رویدادهای ورود
      document.getElementById('enterBtn').addEventListener('click', enterMainPage);
      splashScreen.addEventListener('click', (e) => {
        if (e.target === splashScreen || e.target.closest('.splash-content')) {
          enterMainPage();
        }
      });
      
      // ========== دکمه موزیک (با قطع کردن ویس) ==========
      playPauseBtn.addEventListener('click', () => {
        // اگه ویس در حال پخش بود، قطعش کن
        if (isVoicePlaying) {
          voiceAudio.pause();
          voiceAudio.currentTime = 0;
          isVoicePlaying = false;
          voiceBtn.innerHTML = '<span>🎤</span> پیام من';
          voiceBtn.style.background = "linear-gradient(135deg, #6c63ff, #3a2e8e)";
        }
        
        if (bgAudio.paused) {
          playMusic();
        } else {
          pauseMusic();
        }
      });
      
      // ========== دکمه ویس ==========
      voiceBtn.addEventListener('click', () => {
        if (isVoicePlaying) {
          // استپ کردن ویس
          voiceAudio.pause();
          voiceAudio.currentTime = 0;
          isVoicePlaying = false;
          voiceBtn.innerHTML = '<span>🎤</span> پیام من';
          voiceBtn.style.background = "linear-gradient(135deg, #6c63ff, #3a2e8e)";
        } else {
          // قطع کردن موزیک اگه در حال پخش بود
          if (!bgAudio.paused) {
            pauseMusic();
          }
          // پخش ویس
          voiceAudio.play().catch(e => console.log("خطا در پخش ویس:", e));
          isVoicePlaying = true;
          voiceBtn.innerHTML = '<span>⏹️</span> توقف پیام';
          voiceBtn.style.background = "linear-gradient(135deg, #ff4444, #aa2222)";
        }
      });
      
      // وقتی ویس تموم شد
      voiceAudio.addEventListener('ended', () => {
        isVoicePlaying = false;
        voiceBtn.innerHTML = '<span>🎤</span> پیام من';
        voiceBtn.style.background = "linear-gradient(135deg, #6c63ff, #3a2e8e)";
      });
      
      // ========== شمارشگر زمان ==========
      function startCounter() {
        const startDate = new Date(2025, 4, 29, 0, 0, 0);
        const timerEl = document.getElementById('timerDisplay');
        
        function updateCounter() {
          const now = new Date();
          const diff = now - startDate;
          if (diff < 0) {
            timerEl.innerText = 'به زودی آغاز می‌شه عزیزم 💕';
            return;
          }
          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          const hours = Math.floor((diff % (86400000)) / 3600000);
          const minutes = Math.floor((diff % 3600000) / 60000);
          const seconds = Math.floor((diff % 60000) / 1000);
          timerEl.innerText = `${days} روز، ${hours} ساعت، ${minutes} دقیقه، ${seconds} کنار هم بودیم 😉`;
        }
        
        updateCounter();
        setInterval(updateCounter, 1000);
      }
      
      // ========== ایموجی‌های در حال سقوط ==========
      function startFallingEmojis() {
        const emojisList = ['❤️', '💖', '💗', '💓', '💕', '💞', '💘', '✨', '⭐', '🌟', '🌙', '♥️', '❣️', '💝'];
        const container = document.getElementById('fallingContainer');
        const emojiCount = 70;
        
        function createFallingEmojis() {
          while (container.firstChild) {
            container.removeChild(container.firstChild);
          }
          for (let i = 0; i < emojiCount; i++) {
            const emoji = document.createElement('div');
            emoji.classList.add('falling-emoji');
            emoji.textContent = emojisList[Math.floor(Math.random() * emojisList.length)];
            const size = 22 + Math.random() * 26;
            emoji.style.fontSize = `${size}px`;
            emoji.style.left = `${Math.random() * 100}%`;
            const duration = 6 + Math.random() * 10;
            emoji.style.animationDuration = `${duration}s`;
            emoji.style.animationDelay = `${Math.random() * 12}s`;
            emoji.style.opacity = 0.7 + Math.random() * 0.3;
            container.appendChild(emoji);
          }
        }
        
        createFallingEmojis();
        
        setInterval(() => {
          if (container.children.length < emojiCount + 20) {
            const emoji = document.createElement('div');
            emoji.classList.add('falling-emoji');
            emoji.textContent = emojisList[Math.floor(Math.random() * emojisList.length)];
            const size = 22 + Math.random() * 26;
            emoji.style.fontSize = `${size}px`;
            emoji.style.left = `${Math.random() * 100}%`;
            const duration = 6 + Math.random() * 10;
            emoji.style.animationDuration = `${duration}s`;
            container.appendChild(emoji);
            setTimeout(() => {
              if (emoji.parentNode) emoji.remove();
            }, duration * 1000);
          }
        }, 2000);
      }
      
      // ========== عکس پروفایل ==========
      const profileImg = document.getElementById('profileImg');
      if (profileImg) {
        profileImg.onerror = () => {
          profileImg.src = 'https://placehold.co/400x400/ff9eb5/ffffff?text=❤️';
        };
      }
      
      // ========== تایپ‌رایتر ==========
      function startTypeWriter() {
        const messageEl = document.getElementById('loveMessage');
        const originalText = `
امروز که سالگردمونه، نشستم و به تموم روزهایی که پشت سر گذاشتیم فکر کردم. می‌دونی؟ برای من، تو فقط یه آدم توی زندگیم نیستی؛ تو اون جایی هستی که وقتی از همه دنیا بریدم، پناه می‌برم بهش. بودن کنار تو، امنیت خالصِ.

خیلی سخته بخوام توی چند خط بگم که چقدر بودنت برام حیاتیه. مرسی که همیشه هستی، حتی وقتایی که حوصله خودمم ندارم، تو هستی و تحمل می‌کنی. ممنونم که با بودنت به این زندگی، رنگ و بوی تازه دادی.
کنار تو فهمیدم عشق فقط حرف‌های قشنگ نیست؛ یعنی یکی باشه که وقتی خسته‌ای بفهمه، وقتی دلت گرفته آرومت کنه، و وقتی از همه‌چی ناامید می‌شی، هنوز کنارت بمونه. تو برای من دقیقاً همین بودی؛ یه تکیه‌گاه واقعی، یه دلیل برای لبخند زدن، یه حس امن و قشنگ که توی هیچ‌جای دنیا شبیهش رو پیدا نمی‌کنم.

من از ته دل خوشحالم که تو رو دارم. خوشحالم که هنوز بعد از این همه مدت، دلم با دیدنت می‌لرزه، دلم برای صدات ضعف میره، و هنوزم با یه پیام از طرف تو حالم خوب میشه. این یعنی عشق واقعی، یعنی هنوزم بعد از گذشت زمان، بودن تو برام خاصه، تکراری نیست، کمرنگ نمی‌شه.

می‌خوام بدونی که تو فقط عشق من نیستی، تو بخشی از آرامش منی، بخشی از دلخوشی‌هام، بخشی از آینده‌ای که دوست دارم بسازمش. امیدوارم سال‌های خیلی بیشتری کنار هم باشیم، بخندیم، سختی‌ها رو رد کنیم، و هر سالگرد، بیشتر از سال قبل بهمون ثابت بشه که انتخابمون درست بوده.
آرزوم اینه که سال‌های سال، همین‌طوری دست‌دردست هم باشیم و با هم بزرگ بشیم، با هم پیر بشیم و به این روزها بخندیم. سالگردمون مبارک بهترین انتخابِ زندگیم.
        `;
        
        messageEl.style.whiteSpace = "normal";
        messageEl.style.wordBreak = "break-word";
        messageEl.style.lineHeight = "1.9";
        messageEl.innerHTML = "";
        
        let idx = 0;
        function type() {
          if (idx < originalText.length) {
            messageEl.innerHTML += originalText.charAt(idx);
            idx++;
            setTimeout(type, 35);
          }
        }
        type();
      }
    })();
  </script>
</body>
</html>
